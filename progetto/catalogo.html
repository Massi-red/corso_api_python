<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineManiaci - Catalogo Locale</title>
</head>
<body style="font-family: sans-serif; max-width: 900px; margin: 30px auto; padding: 20px; line-height: 1.5;">

    <nav style="margin-bottom: 20px;">
        <a href="login.html">Login</a> |
        <a href="catalogo.html">Catalogo</a> |
        <a href="playlist.html">Le mie Playlist</a>
    </nav>

    <h1>🎬 CineManiaci - Cerca Film</h1>
    <p>Cerca i titoli archiviati all'interno del database locale della piattaforma.</p>
   
    <div style="margin-bottom: 30px; background: #f1f5f9; padding: 15px; border-radius: 6px;">
        <input type="text" id="campoCerca" placeholder="Scrivi una parte del titolo (es. Matrix)..." style="padding: 8px; width: 300px; font-size: 14px;">
        <button onclick="avviaRicerca()" style="padding: 8px 15px; font-size: 14px; cursor: pointer;">Cerca</button>
    </div>
 
    <h2>Risultati della Ricerca</h2>
    <div id="risultati" style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 40px;">
        </div>
 
    <hr>
 
    <div id="schedaFilm" style="display: none; background: #f0fdf4; border: 1px solid #bbf7d0; padding: 25px; border-radius: 8px;">
        <h2 id="schedaTitolo" style="color: #16a34a; margin-top: 0;"></h2>
        <img id="schedaImmagine" src="" alt="Locandina del film" style="max-width: 220px; border-radius: 8px; margin-bottom: 15px; display: none;">
        <p><b>Anno di Uscita:</b> <span id="schedaAnno"></span></p>
        <p><b>Trama del Film:</b></p>
        <p id="schedaTrama" style="font-style: italic; color: #374151;"></p>

        <hr>

        <h3>📺 Video e Commenti</h3>
        <div id="listaVideo" style="margin-bottom: 20px;"></div>

        <div style="background: #e0f2fe; padding: 15px; border-radius: 6px;">
            <h4 style="margin-top:0;">Aggiungi un video/recensione (richiede login)</h4>
            <input type="text" id="nuovoVideoUrl" placeholder="Link YouTube" style="padding: 6px; width: 260px; margin-bottom: 6px;"><br>
            <textarea id="nuovoVideoCommento" placeholder="Commento (opzionale)" style="padding: 6px; width: 260px; height: 50px; margin-bottom: 6px;"></textarea><br>
            <button onclick="aggiungiVideo()" style="padding: 6px 12px; cursor:pointer;">Pubblica</button>
        </div>
    </div>
   
   <script>
        const API_URL = "https://effective-space-barnacle-qv775v5wqgpgfpr6-8000.app.github.dev";
        let filmSelezionatoId = null;
 
        async function avviaRicerca() {
 
        // ✅ Leggo il testo ricercato dall’utente
        const keyword = document.getElementById("campoCerca").value;
 
        // Controllo campo vuoto
        if (!keyword.trim()) {
            alert("Inserisci un testo per la ricerca!");
            return;
        }
 
        try {
            // Nascondo la scheda precedente prima di mostrare i nuovi risultati
            document.getElementById("schedaFilm").style.display = "none";

            // ✅ Effettuo la chiamata al backend
            const response = await fetch(`${API_URL}/film/ricerca?keyword=${encodeURIComponent(keyword)}`);
            const risultati = await response.json();
 
            const contenitore = document.getElementById("risultati");
 
            // ✅ Pulisco i vecchi risultati
            contenitore.innerHTML = "";
 
            // ✅ Controllo se non ci sono risultati
            if (risultati.length === 0) {
                contenitore.innerHTML = "<p>Nessun film trovato.</p>";
                return;
            }
 
            // ✅ Ciclo l'array dei film
            risultati.forEach(film => {
 
                // ✅ Creo il div per ogni film
                const divFilm = document.createElement("div");
 
                divFilm.style.border = "1px solid #ccc";
                divFilm.style.padding = "10px";
                divFilm.style.borderRadius = "6px";
                divFilm.style.cursor = "pointer";
 
                // ✅ Preparo il contenuto
                divFilm.innerHTML = `
                    <h3>${film.titolo}</h3>
                    ${film.url_locandina ? `<img src="${film.url_locandina}" alt="${film.titolo}" style="width: 100%; max-height: 220px; object-fit: cover; border-radius: 6px; margin-bottom: 8px;">` : ""}
                    <p><b>Anno:</b> ${film.anno}</p>
                    <button onclick="apriScheda(${film.id})">Dettagli</button>
                `;
 
                // Click per aprire scheda
                divFilm.onclick = () => apriScheda(film.id);
 
                // ✅ Aggiungo al contenitore
                contenitore.appendChild(divFilm);
            });
 
        } catch (errore) {
            console.error("Errore:", errore);
            document.getElementById("risultati").innerHTML =
                "<p>Errore durante la ricerca.</p>";
        }
    }
    async function apriScheda(idFilm) {
        try {
            const response = await fetch(`${API_URL}/film/${idFilm}`);
            const film = await response.json();
 
            filmSelezionatoId = film.id;

            document.getElementById("schedaTitolo").textContent = film.titolo;
            document.getElementById("schedaAnno").textContent = film.anno;
            document.getElementById("schedaTrama").textContent = film.trama;

            const immagine = document.getElementById("schedaImmagine");
            if (film.url_locandina) {
                immagine.src = film.url_locandina;
                immagine.style.display = "block";
            } else {
                immagine.src = "";
                immagine.style.display = "none";
            }
 
            document.getElementById("schedaFilm").style.display = "block";

            // Carico la lista dei video/commenti associati a questo film
            await caricaVideo(idFilm);
        } catch (errore) {
            console.error("Errore:", errore);
            alert("Errore nel recupero dei dettagli del film.");
        }
    }

    // Chiunque può leggere i video/commenti, senza bisogno del token
    async function caricaVideo(idFilm) {
        const contenitore = document.getElementById("listaVideo");
        contenitore.innerHTML = "Caricamento...";

        try {
            const risposta = await fetch(`${API_URL}/film/${idFilm}/video`);
            const video = await risposta.json();

            if (video.length === 0) {
                contenitore.innerHTML = "<p><i>Nessun video o commento ancora presente. Sii il primo!</i></p>";
                return;
            }

            contenitore.innerHTML = "";
            video.forEach(v => {
                const divVideo = document.createElement("div");
                divVideo.style.borderBottom = "1px solid #d1fae5";
                divVideo.style.padding = "8px 0";
                divVideo.innerHTML = `
                    <a href="${v.url_video_youtube}" target="_blank">${v.url_video_youtube}</a>
                    ${v.commento ? `<p style="margin: 4px 0 0 0;">${v.commento}</p>` : ""}
                `;
                contenitore.appendChild(divVideo);
            });
        } catch (errore) {
            console.error("Errore:", errore);
            contenitore.innerHTML = "<p>Errore nel caricamento dei video.</p>";
        }
    }

    // Solo chi ha effettuato il login (possiede un token) può pubblicare
    async function aggiungiVideo() {
        const tokenSalvato = localStorage.getItem("session_token");

        if (!tokenSalvato) {
            alert("Devi prima effettuare il login per aggiungere un video o un commento!");
            return;
        }

        const url = document.getElementById("nuovoVideoUrl").value;
        const commento = document.getElementById("nuovoVideoCommento").value;

        if (!url.trim()) {
            alert("Inserisci un link YouTube valido!");
            return;
        }

        try {
            const risposta = await fetch(`${API_URL}/film/${filmSelezionatoId}/video?token=${tokenSalvato}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ url_video_youtube: url, commento: commento || null })
            });

            const dati = await risposta.json();

            if (risposta.ok) {
                document.getElementById("nuovoVideoUrl").value = "";
                document.getElementById("nuovoVideoCommento").value = "";
                await caricaVideo(filmSelezionatoId);
            } else {
                alert("Errore: " + dati.detail);
            }
        } catch (errore) {
            console.error("Errore:", errore);
            alert("Errore durante l'invio del video.");
        }
    }
    </script>
</body>
</html>
